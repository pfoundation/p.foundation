name: Github Pages

on:
  push:
    paths-ignore:
      - 'LICENSE'
      - 'README.md'
    branches:
      - master

jobs:
  build:
    name: Build and deploy website
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: lts/jod
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint

      - name: Check backend URL configuration
        if: ${{ vars.PF_API_BASE_URL == '' }}
        run:
          echo "::warning::The PF_API_BASE_URL repository variable is not set.
          The site will guess the worker URL; donations and newsletter signups
          may fail. See workers/README.md."

      - name: Build website
        run: npm run build
        env:
          # Base URL of the Cloudflare Worker that backs donations and the
          # mailing list. Set as a repository variable; see workers/README.md.
          PF_API_BASE_URL: ${{ vars.PF_API_BASE_URL }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: p.foundation
